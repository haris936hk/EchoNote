<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luminous Archive - Recording</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617; /* Specific mandated OLED black */
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom pulsing glow for the AI/Recording Halo */
        .recording-halo {
            box-shadow: 0 0 60px 10px rgba(189, 194, 255, 0.15);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#6bff8f",
                        "inverse-on-surface": "#2a3043",
                        "on-secondary-fixed-variant": "#4f319c",
                        "primary": "#bdc2ff",
                        "on-primary": "#131e8c",
                        "primary-container": "#818cf8",
                        "outline-variant": "#454653",
                        "on-primary-fixed": "#000767",
                        "surface": "#0c1324",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "surface-container-high": "#23293c",
                        "on-tertiary-fixed-variant": "#005321",
                        "surface-container-highest": "#2e3447",
                        "on-primary-fixed-variant": "#2f3aa3",
                        "outline": "#908f9e",
                        "inverse-primary": "#4953bc",
                        "on-tertiary-fixed": "#002109",
                        "surface-container": "#191f31",
                        "surface-dim": "#0c1324",
                        "on-secondary-fixed": "#21005e",
                        "surface-bright": "#33394c",
                        "secondary-container": "#4f319c",
                        "on-background": "#dce1fb",
                        "tertiary-container": "#00ac4e",
                        "surface-container-lowest": "#070d1f",
                        "surface-variant": "#2e3447",
                        "primary-fixed": "#e0e0ff",
                        "tertiary": "#4ae176",
                        "on-tertiary-container": "#003613",
                        "inverse-surface": "#dce1fb",
                        "primary-fixed-dim": "#bdc2ff",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#bea8ff",
                        "on-surface-variant": "#c6c5d5",
                        "on-secondary": "#381385",
                        "surface-container-low": "#151b2d",
                        "secondary-fixed-dim": "#cebdff",
                        "secondary-fixed": "#e8ddff",
                        "on-primary-container": "#101b8a",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface-tint": "#bdc2ff",
                        "on-tertiary": "#003915",
                        "secondary": "#cebdff",
                        "on-surface": "#dce1fb",
                        "background": "#0c1324"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-[#020617] text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top Status Bar (Minimal) -->
<div class="w-full flex justify-between items-center px-8 py-6 z-50"><div class="flex items-center gap-8">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="text-xl font-bold tracking-tight text-on-surface">EchoNote</span>
</div>
<nav class="hidden md:flex items-center gap-6 text-sm font-medium text-on-surface-variant">
<a class="hover:text-primary transition-colors" href="#">Dashboard</a>
<a class="text-primary" href="#">Record</a>
<a class="hover:text-primary transition-colors" href="#">Meetings</a>
</nav>
</div>
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center border-2 border-primary/20">
<span class="material-symbols-outlined text-on-primary-container text-xl">person</span>
</div>
</div></div>
<!-- Main Content: Immersive Viewport -->
<main class="flex-grow flex flex-col items-center justify-center relative px-6">
<!-- Background Ambient Glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Recording Halo (The Visual Anchor) -->
<div class="relative flex items-center justify-center mb-16">
<!-- Thin Pulsing Rings -->
<div class="absolute w-72 h-72 border border-primary/30 rounded-full animate-ping opacity-20"></div>
<div class="absolute w-64 h-64 border-2 border-primary/10 rounded-full"></div>
<!-- Central Orb with Microphone -->
<div class="w-56 h-56 rounded-full bg-surface-container-highest/30 backdrop-blur-md flex items-center justify-center relative z-10 border border-primary/20 shadow-[0_0_50px_rgba(189,194,255,0.1)]">
<div class="flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl drop-shadow-[0_0_15px_rgba(189,194,255,0.5)]" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
</div>
<!-- Metrics & Waveform -->
<div class="w-full max-w-2xl flex flex-col items-center space-y-12">
<!-- Timer Display -->
<div class="text-center">
<h1 class="mono text-5xl md:text-7xl font-medium tracking-tight text-on-surface">03:47</h1>
<p class="text-on-surface-variant text-lg mt-4 font-light tracking-wide">6:13 remaining</p>
</div>
<!-- Minimal Bar Waveform -->
<div class="w-full flex items-center justify-center gap-1.5 h-12">
<!-- Simulated Waveform Bars -->
<div class="w-1.5 h-4 bg-primary-container/20 rounded-full"></div>
<div class="w-1.5 h-6 bg-primary-container/30 rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-container/50 rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-container/40 rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1.5 h-6 bg-primary-container/30 rounded-full"></div>
<div class="w-1.5 h-4 bg-primary-container/20 rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-container/40 rounded-full"></div>
<div class="w-1.5 h-10 bg-primary-container/50 rounded-full"></div>
<div class="w-1.5 h-5 bg-primary-container/30 rounded-full"></div>
<div class="w-1.5 h-7 bg-primary-container/40 rounded-full"></div>
<div class="w-1.5 h-3 bg-primary-container/20 rounded-full"></div>
<div class="w-1.5 h-9 bg-primary-container/50 rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1.5 h-6 bg-primary-container/30 rounded-full"></div>
<div class="w-1.5 h-4 bg-primary-container/20 rounded-full"></div>
</div>
<!-- Progress Bar -->
<div class="w-full max-w-md flex flex-col gap-3">
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-container to-primary w-[37.8%]"></div>
</div>
<div class="flex justify-between items-center text-[10px] tracking-widest text-outline uppercase font-bold">
<span>0:00</span>
<span>10:00 limit</span>
</div>
</div>
</div>
</main>
<!-- Controls Bar -->
<footer class="w-full py-12 flex justify-center items-center z-50">
<div class="flex items-center gap-12"><!-- Pause Action -->
<button class="group flex flex-col items-center gap-3 transition-all duration-300">
<div class="w-16 h-16 rounded-full border border-outline-variant flex items-center justify-center group-hover:bg-secondary/10 group-hover:border-secondary transition-colors">
<span class="material-symbols-outlined text-secondary text-3xl">pause</span>
</div>
<span class="text-sm font-bold tracking-widest text-secondary uppercase">Pause</span>
</button>
<!-- Stop Action -->
<button class="group flex flex-col items-center gap-3 transition-all duration-300">
<div class="w-20 h-20 rounded-full bg-error/10 border border-error/30 flex items-center justify-center group-hover:bg-error group-hover:border-error transition-all shadow-lg shadow-error/10">
<span class="material-symbols-outlined text-error group-hover:text-on-error text-4xl" style="font-variation-settings: 'FILL' 1;">stop</span>
</div>
<span class="text-sm font-bold tracking-widest text-error uppercase">Stop</span>
</button></div>
</footer>
<!-- Semantic AI Insight Overlay (Subtle) -->
</body></html>
