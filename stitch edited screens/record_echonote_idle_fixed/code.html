<style>
        body {
            background-color: #020617; /* Specific deep OLED black requested */
            color: #dce1fb;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .recording-halo {
            position: relative;
            width: 128px;
            height: 128px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
        }
        .recording-halo::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, #bdc2ff, #cebdff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }
        .glow-soft {
            box-shadow: 0 0 40px rgba(189, 194, 255, 0.1);
        }
        .text-jetbrains {
            font-family: 'JetBrains Mono', monospace;

<main class="flex flex-col items-center justify-center space-y-12 max-w-lg w-full">
<!-- Status Header -->
<!-- Recording Visualizer Halo -->
<div class="relative">
<!-- Subtle background ambient glow -->
<div class="absolute inset-0 bg-primary/5 blur-[100px] rounded-full"></div>
<div class="recording-halo glow-soft z-10">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="mic">mic</span>
</div>
<!-- Orbiting metadata (Editorial Asymmetry) -->
</div><div class="flex items-center justify-center space-x-2 mt-4">
<span class="w-1.5 h-1.5 rounded-full bg-[#22C55E] animate-pulse"></span>

</div>
<!-- Timer Display -->
<div class="text-center">
<h2 class="text-jetbrains text-7xl font-medium tracking-tighter text-on-surface">00:00</h2>
<p class="text-on-surface-variant/50 text-xs mt-4 tracking-widest font-label uppercase">Recording Time</p>
</div>
<!-- Action Buttons Cluster -->
<div class="flex flex-row items-center justify-center space-x-4 w-full pt-8">
<button class="flex-1 max-w-[200px] py-4 px-6 rounded-xl bg-[#22C55E] text-white font-headline font-bold text-sm tracking-tight flex items-center justify-center space-x-2 hover:opacity-90 transition-all duration-300 shadow-[0_8px_30px_rgb(34,197,94,0.2)]">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
<span>Start Recording</span>
</button>
<button class="flex-1 max-w-[200px] py-4 px-6 rounded-xl border border-outline-variant/30 text-on-surface font-headline font-medium text-sm tracking-tight flex items-center justify-center space-x-2 hover:bg-surface-container-low transition-all duration-300">

</button>

<div class="h-6 w-px bg-outline-variant/20"></div>
