<body class="font-body text-on-surface min-h-screen flex items-center justify-center relative px-6">
<!-- Decorative Gradient Blob -->
<div class="bg-blob"></div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[420px]">
<!-- Centered Glass Card -->
<div class="glass-card rounded-[24px] p-10 flex flex-col items-center shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
<!-- 1. EchoNote Logo -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="mic" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="flex flex-col items-center">
<span class="text-2xl font-extrabold tracking-tighter text-primary font-headline">EchoNote</span>
</div>
</div>
<!-- 2 & 3. Header & Subtitle -->
<div class="text-center mb-10">
<h2 class="text-3xl font-bold tracking-tight text-on-surface mb-2 font-headline">Sign in to EchoNote</h2>
<p class="text-secondary font-medium tracking-wide">Your meeting intelligence awaits</p>
</div>
<!-- 4. Continue with Google Button -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-white text-[#1f2937] font-semibold rounded-xl transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] shadow-xl hover:shadow-white/10 group">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-headline tracking-tight">Continue with Google</span>
</button>
<!-- 5. Caption -->
<p class="mt-10 text-[11px] text-center text-outline leading-relaxed max-w-[280px]">
                By continuing, you agree to our 
                <a class="text-on-surface-variant hover:text-primary underline underline-offset-4 decoration-outline/30 transition-colors" href="#">Terms of Service</a> 
                and 
                <a class="text-on-surface-variant hover:text-primary underline underline-offset-4 decoration-outline/30 transition-colors" href="#">Privacy Policy</a>.
            </p>
<!-- 6. Privacy Badge -->
<div class="mt-8 pt-8 border-t border-outline-variant/15 w-full flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-outline" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-medium uppercase tracking-[0.12em] text-outline font-['JetBrains_Mono']">Secured with Google OAuth</span>
</div>
</div>
<!-- Hidden Branding/Status Indicators (Design System Elements) -->
<div class="mt-12 flex justify-center gap-8 items-center opacity-40">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary-fixed shadow-[0_0_8px_rgba(107,255,143,0.5)]"></div>
