<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed": "#6bff8f",
            "inverse-on-surface": "#2a3043",
            "on-secondary-fixed-variant": "#4f319c",
            "primary": "#bdc2ff",
            "on-primary": "#131e8c",
            "primary-container": "#818cf8",
            "outline-variant": "#454653",
            "on-primary-fixed": "#000767",
            "surface": "#0c1324",
            "error-container": "#93000a",
            "error": "#ffb4ab",
            "surface-container-high": "#23293c",
            "on-tertiary-fixed-variant": "#005321",
            "surface-container-highest": "#2e3447",
            "on-primary-fixed-variant": "#2f3aa3",
            "outline": "#908f9e",
            "inverse-primary": "#4953bc",
            "on-tertiary-fixed": "#002109",
            "surface-container": "#191f31",
            "surface-dim": "#0c1324",
            "on-secondary-fixed": "#21005e",
            "surface-bright": "#33394c",
            "secondary-container": "#4f319c",
            "on-background": "#dce1fb",
            "tertiary-container": "#00ac4e",
            "surface-container-lowest": "#070d1f",
            "surface-variant": "#2e3447",
            "primary-fixed": "#e0e0ff",
            "tertiary": "#4ae176",
            "on-tertiary-container": "#003613",
            "inverse-surface": "#dce1fb",
            "primary-fixed-dim": "#bdc2ff",
            "on-error": "#690005",
            "on-error-container": "#ffdad6",
            "on-secondary-container": "#bea8ff",
            "on-surface-variant": "#c6c5d5",
            "on-secondary": "#381385",
            "surface-container-low": "#151b2d",
            "secondary-fixed-dim": "#cebdff",
            "secondary-fixed": "#e8ddff",
            "on-primary-container": "#101b8a",
            "tertiary-fixed-dim": "#4ae176",
            "surface-tint": "#bdc2ff",
            "on-tertiary": "#003915",
            "secondary": "#cebdff",
            "on-surface": "#dce1fb",
            "background": "#020617"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"],
            "mono": ["JetBrains Mono"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      background-color: #020617;
      color: #dce1fb;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .glass-card {
      background: rgba(46, 52, 71, 0.4);
      backdrop-filter: blur(24px);
    }
    .tonal-transition {
      background: linear-gradient(180deg, rgba(2, 6, 23, 1) 0%, rgba(2, 6, 23, 0) 100%);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="min-h-screen selection:bg-primary/30">
<!-- Shared Component: TopAppBar -->
<header class="fixed top-0 w-full z-50 tonal-transition">
<div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#bdc2ff]">mic</span>
<span class="text-lg font-bold tracking-tighter text-[#bdc2ff]">EchoNote</span>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-on-surface-variant hover:text-primary transition-colors font-medium text-sm" href="#">Dashboard</a>
<a class="text-primary font-semibold transition-colors text-sm" href="#">Record</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-medium text-sm" href="#">Meetings</a>
</nav>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-highest border border-outline-variant/20">
<img alt="User profile" data-alt="close-up portrait of a professional man with neutral lighting and blurred corporate background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq1ioD67WhgRniin1s-T66Xe2rxz1ogmu3RuTKI63BMNsnA89KzB4Vdyzr3Z6339c020qST_jTvC-FSVZ6070PFh7ts54t3RcsLTH92tXdnSsYY8EQexfUWI1l7-eQmEL3vxvPgN1KAFYjs7-eO-1HnK8P7QqO9pDLOj6YijWU_VY-L0VGHN9md54u14vWPrctOYknRn8f9BxS2IlcTZdUKkR6zB5EKtzGMEp3Pfsj7FzeFHX7I944LRRT_3Js3B_8MKrI1caVNck"/>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative pt-32 pb-20 px-6 max-w-[600px] mx-auto min-h-screen flex flex-col">
<!-- Subtitle text only -->
<div class="mb-10">
<p class="text-on-surface-variant text-lg leading-relaxed text-center">Your audio has been successfully captured. Refine the metadata below to optimize the AI-driven transcription and insights generation.</p>
</div>
<!-- Form Container -->
<div class="space-y-8 flex-1">
<form class="space-y-6">
<!-- Title Input -->
<div class="space-y-2">
<label class="block font-mono text-[10px] text-outline tracking-widest uppercase px-1" for="title">Session Title</label>
<input class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl py-4 px-5 focus:ring-1 focus:ring-primary focus:border-primary text-on-surface transition-all placeholder:text-outline-variant" id="title" placeholder="Enter meeting title..." type="text" value="Q1 Planning Session"/>
</div>
<!-- Category Dropdown -->
<div class="space-y-2">
<label class="block font-mono text-[10px] text-outline tracking-widest uppercase px-1" for="category">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl py-4 px-5 appearance-none focus:ring-1 focus:ring-primary focus:border-primary text-on-surface" id="category">
<option>Planning</option>
<option>Sales</option>
<option>Standup</option>
<option>Workshop</option>
<option>User Interview</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="block font-mono text-[10px] text-outline tracking-widest uppercase px-1" for="desc">Brief Description</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant/20 rounded-xl p-5 focus:ring-1 focus:ring-primary focus:border-primary text-on-surface placeholder:text-outline-variant" id="desc" placeholder="What was the core objective of this meeting?" rows="4"></textarea>
</div>
<!-- Audio Preview Bar -->
<div class="pt-2">
<div class="bg-surface-container-highest/30 rounded-2xl p-4 flex items-center gap-4 border border-outline-variant/10">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-on-primary hover:scale-105 transition-transform shrink-0" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<div class="flex-1 space-y-2">
<div class="flex justify-between text-[10px] font-mono text-outline uppercase tracking-tighter">
<span>Recording_Final_01.wav</span>
<span>42:15</span>
</div>
<div class="relative h-1.5 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="absolute inset-0 bg-primary/10"></div>
<div class="absolute top-0 left-0 bottom-0 bg-primary w-1/3 rounded-full"></div>
</div>
</div>
</div>
</div>
</form>
</div>
<!-- Actions -->
<div class="mt-12 flex items-center gap-4 w-full">
<button class="flex-1 flex items-center justify-center gap-2 px-6 py-4 rounded-xl text-outline font-semibold hover:text-on-surface hover:bg-white/5 transition-all group">
<span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Recording
      </button>
<button class="flex-[1.5] py-4 bg-[#22C55E] hover:bg-[#1da850] text-white font-bold rounded-xl shadow-[0_4px_20px_rgba(34,197,94,0.3)] transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span>Upload &amp; Process</span>
</button>
</div>
</main>
<!-- Decorative Background elements -->
<div class="fixed top-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-5%] left-[10%] w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
</body></html>
